label: get_latest_alerts
meta:
  mcp:
    enabled: true
    description: "Fetch the most recent CogniPulse alerts."
    properties:
      - name: limit
        type: number
        description: "Max number of alerts to return (1-100). Default 20."
        required: false
processors:
  - label: validate_inputs
    mutation: |
      let n = (this.limit.or(20)).number()
      meta limit = if $n < 1 { 1 } else if $n > 100 { 100 } else { $n }

  - label: fetch_alerts
    http:
      url: "http://rule-engine:8000/latest/alerts?limit=${! @limit }"
      verb: GET
      timeout: "10s"

  - label: normalize
    mutation: |
      root = this
