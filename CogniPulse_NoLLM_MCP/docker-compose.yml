services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: cogni_redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
    ports:
      - "9092:9092"
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:16
    container_name: cogni_postgres
    environment:
      POSTGRES_USER: cognipulse
      POSTGRES_PASSWORD: cognipulse
      POSTGRES_DB: cognipulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: cogni_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  rule-engine:
    build:
      context: ./services/rule-engine
    container_name: cogni_rule_engine
    environment:
      KAFKA_BROKERS: redpanda:9092
      ALERTS_TOPIC: cogni.alerts
      ACTIONS_TOPIC: cogni.actions
      EVENTS_TOPIC: cogni.events
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: cognipulse
    depends_on:
      redpanda:
        condition: service_healthy
      mongo:
        condition: service_started
    ports:
      - "8000:8000"

  cpp-analyzer:
    build:
      context: ./services/cpp-analyzer
    container_name: cogni_cpp_analyzer
    environment:
      KAFKA_BROKERS: redpanda:9092
      EVENTS_TOPIC: cogni.events
      ALERTS_TOPIC: cogni.alerts
      POSTGRES_DSN: host=postgres port=5432 dbname=cognipulse user=cognipulse password=cognipulse
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: cognipulse
      TEMP_THRESHOLD: "80.0"
      VIB_THRESHOLD: "8.0"
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_started
      mongo:
        condition: service_started

  event-simulator:
    build:
      context: ./services/event-simulator
    container_name: cogni_event_sim
    environment:
      KAFKA_BROKERS: redpanda:9092
      EVENTS_TOPIC: cogni.events
      DEVICE_ID: factory-01
      RATE_HZ: "5"
      ANOMALY_PROB: "0.05"
    depends_on:
      redpanda:
        condition: service_healthy
  

  mcp-server:
    image: redpandadata/redpanda:latest
    container_name: cogni_mcp_server
    working_dir: /mcp
    volumes:
      - ./services/mcp-server:/mcp:ro
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "rpk connect mcp-server --address 0.0.0.0:3333 /mcp/resources"
    depends_on:
      redpanda:
        condition: service_healthy
      rule-engine:
        condition: service_started
    ports:
      - "3333:3333"



volumes:
  pgdata:
  mongodata:
