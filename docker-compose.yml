services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      # Wait until broker is actually ready (prevents "connection refused"/"NoBrokersAvailable" noise)
      test: ["CMD-SHELL", "rpk cluster health -X brokers=localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  postgres:
    image: postgres:16
    container_name: cognipulse-postgres
    environment:
      POSTGRES_USER: cognipulse
      POSTGRES_PASSWORD: cognipulse
      POSTGRES_DB: cognipulse
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      # Wait until Postgres accepts connections
      test: ["CMD-SHELL", "pg_isready -U cognipulse -d cognipulse -h localhost -p 5432 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Creates topics once Redpanda is healthy (removes "unknown topic/partition" startup errors)
  init-topics:
    image: redpandadata/redpanda:latest
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "rpk topic create cogni.telemetry -p 1 -r 1 -X brokers=redpanda:9092 || true &&
       rpk topic create cogni.alerts    -p 1 -r 1 -X brokers=redpanda:9092 || true &&
       rpk topic create cogni.actions   -p 1 -r 1 -X brokers=redpanda:9092 || true"

  event-simulator:
    build: ./services/event-simulator
    container_name: cognipulse-event-simulator
    environment:
      BOOTSTRAP: redpanda:9092
      OUT_TOPIC: cogni.telemetry
      DEVICE_COUNT: "5"
      INTERVAL_MS: "500"
    depends_on:
      redpanda:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully

  cpp-analyzer:
    build: ./services/cpp-analyzer
    container_name: cognipulse-cpp-analyzer
    environment:
      BOOTSTRAP: redpanda:9092
      IN_TOPIC: cogni.telemetry
      OUT_TOPIC: cogni.alerts
    depends_on:
      redpanda:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully

  mcp-server:
    build: ./services/mcp-server
    container_name: cognipulse-mcp-server
    environment:
      BOOTSTRAP: redpanda:9092
      TELEMETRY_TOPIC: cogni.telemetry
      ALERTS_TOPIC: cogni.alerts
      ACTIONS_TOPIC: cogni.actions

      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: cognipulse
      PGUSER: cognipulse
      PGPASSWORD: cognipulse
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully

  rule-engine:
    build: ./services/rule-engine
    container_name: cognipulse-rule-engine
    environment:
      BOOTSTRAP: redpanda:9092
      IN_TOPIC: cogni.alerts
      OUT_TOPIC: cogni.actions
      MCP_BASE_URL: http://mcp-server:8080

      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: cognipulse
      PGUSER: cognipulse
      PGPASSWORD: cognipulse
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
      mcp-server:
        condition: service_started

  visibility:
    build: ./services/visibility
    container_name: cognipulse-visibility
    environment:
      MCP_BASE_URL: http://mcp-server:8080
    ports:
      - "8501:8501"
    depends_on:
      mcp-server:
        condition: service_started
